<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Crunch Haven Snacks</title>
<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: #fff8e6;
}

header {
    background: gold;
    padding: 20px;
    text-align: center;
    font-size: 28px;
    font-weight: bold;
}

.container {
    padding: 20px;
}

.card {
    background: white;
    padding: 15px;
    margin: 10px 0;
    border-radius: 10px;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
}

.price {
    float: right;
    font-weight: bold;
}

button {
    padding: 10px;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    margin-top: 10px;
}

.whatsapp {
    background: #25D366;
    color: white;
}

.pay {
    background: #ff9800;
    color: white;
}
</style>
</head>

<body>

<header>
Crunch Haven Snacks 🍟
</header>

<div class="container">

<div class="card">
Chapati <span class="price">15</span>
</div>

<div class="card">
Samosa <span class="price">10</span>
</div>

<div class="card">
Smokie <span class="price">35</span>
</div>

<div class="card">
Sausage <span class="price">30</span>
</div>

<div class="card">
Smocha <span class="price">50</span>
</div>

<div class="card">
Bhajia <span class="price">20+</span>
</div>

<a href="https://wa.me/254140659201?text=Hello%20I%20want%20to%20order%20snacks%20from%20Crunch%20Haven" target="_blank">
<button class="whatsapp">Order on WhatsApp</button>
</a>

<button class="pay" onclick="payNow()">Pay via M-Pesa</button>

</div>

<script>
function payNow() {
    fetch("http://localhost:3000/stkpush", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            phone: "254140659201",
            amount: 100
        })
    })
    .then(res => res.json())
    .then(data => {
        alert("Payment request sent! Check your phone.");
    })
    .catch(err => {
        alert("Payment failed. Check backend.");
    });
}
</script>

</body>
</html>
